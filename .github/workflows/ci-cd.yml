name: CI/CD Pipeline

# Run this workflow on every push and pull request to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code from the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      # Step 4: Run tests
      - name: Run tests
        run: pytest

      # Step 5: Build the Docker image (validates the Dockerfile works)
      - name: Build Docker image
        run: docker build -t docker-cicd-demo:latest .

      # Step 6: Smoke test — run the container and check it responds
      - name: Test container
        run: |
          docker run -d -p 5000:5000 --name testapp docker-cicd-demo:latest
          sleep 3
          curl -f http://localhost:5000/health || exit 1
          docker stop testapp
